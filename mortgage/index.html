<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    --ink: #e8dcc8;
    --ink-dim: #9a8c7a;
    --ink-faint: #5c5247;
    --parchment: #1a1612;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,.15);
    --burgundy: #7a2e3e;
    --burgundy-dim: rgba(122,46,62,.2);
    --lauren: #9b6bb0;
    --polina: #4a9b9b;
    --stewart: #b0844a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse 100% 50% at 50% 0%, rgba(201,168,76,.04), transparent),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(122,46,62,.06), transparent);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── Ornamental Border ── */
  body::before {
    content: '';
    position: fixed;
    inset: 12px;
    border: 1px solid rgba(201,168,76,.12);
    pointer-events: none;
    z-index: 100;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 15px;
    border: 1px solid rgba(201,168,76,.06);
    pointer-events: none;
    z-index: 100;
  }

  .manuscript {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* ── Title ── */
  .title-block {
    text-align: center;
    margin-bottom: 48px;
  }
  .title-block h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .title-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .title-ornament .line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .title-ornament .diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .title-block .subtitle {
    font-style: italic;
    color: var(--ink-dim);
    font-size: 16px;
  }

  /* ── Section Dividers ── */
  .chapter {
    margin-bottom: 56px;
  }
  .chapter-heading {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .chapter-heading::before,
  .chapter-heading::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ink-faint));
  }
  .chapter-heading::before {
    right: calc(50% + 80px);
    background: linear-gradient(90deg, transparent, var(--ink-faint));
  }
  .chapter-heading::after {
    left: calc(50% + 80px);
    background: linear-gradient(270deg, transparent, var(--ink-faint));
  }

  /* ── Property Ledger ── */
  .property-ledger {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-top: 8px;
  }
  .ledger-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid rgba(201,168,76,.08);
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-label {
    font-size: 14px;
    color: var(--ink-dim);
    font-style: italic;
    min-width: 140px;
  }
  .ledger-input-wrap {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    padding-left: 20px;
  }
  .ledger-input-wrap input {
    width: 180px;
    text-align: right;
    padding: 8px 12px;
    border: 1px solid rgba(201,168,76,.18);
    border-radius: 4px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(255,255,255,.03);
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .ledger-input-wrap input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,.06);
  }

  /* ── The Chart Chapter ── */
  .chart-chapter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .pie-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    user-select: none;
    -webkit-user-select: none;
  }
  .pie-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
    shape-rendering: geometricPrecision;
  }
  .slice { transition: opacity .15s; }
  .slice-hit {
    fill: transparent;
    cursor: grab;
    pointer-events: all;
  }
  .slice-hit.dragging { cursor: grabbing; }
  .slice-label {
    font-size: 9px;
    font-weight: 600;
    fill: #fff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.4);
  }

  .chart-hint {
    font-style: italic;
    color: var(--ink-faint);
    font-size: 13px;
  }

  .pie-legend {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pie-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
  }
  .pie-swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .pie-legend-item .pct {
    font-weight: 700;
    margin-left: 2px;
  }



  /* ── The Reckoning (Results) ── */
  .reckoning-wrap {
    max-width: 560px;
    margin: 0 auto;
  }
  .reckoning-table {
    width: 100%;
    border-collapse: collapse;
  }
  .reckoning-table thead th {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-dim);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--ink-faint);
  }
  .reckoning-table thead th:last-child {
    text-align: right;
  }
  .reckoning-table tbody td {
    padding: 16px 12px;
    font-size: 15px;
    border-bottom: 1px solid rgba(201,168,76,.06);
    vertical-align: top;
  }
  .reckoning-table tbody td:last-child {
    text-align: right;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .reckoning-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .reckoning-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .reckoning-dot.lauren { background: var(--lauren); }
  .reckoning-dot.polina { background: var(--polina); }
  .reckoning-dot.stewart { background: var(--stewart); }

  .reckoning-breakdown {
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.9;
  }
  .reckoning-breakdown .row {
    display: flex;
    justify-content: space-between;
    gap: 24px;
  }

  /* ── Grand Total ── */
  .grand-total {
    text-align: center;
    padding: 32px 0;
    margin-top: 8px;
    border-top: 1px solid var(--ink-faint);
  }
  .grand-total .label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .grand-total .amount {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* ── Epilogue (Summary) ── */
  .epilogue {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 40px;
  }
  @media (max-width: 500px) {
    .epilogue { grid-template-columns: 1fr 1fr; }
  }
  .epilogue-item {
    text-align: center;
    padding: 20px 12px;
    border: 1px solid rgba(201,168,76,.1);
    position: relative;
  }
  .epilogue-item::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 1px;
    background: var(--gold);
  }
  .epilogue-item .val {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }
  .epilogue-item .lbl {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 6px;
    font-style: italic;
  }

  /* ── Two-Column: Pie + Property ── */
  .dual-chapter {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .dual-chapter { grid-template-columns: 1fr; }
    .pie-wrap { width: 240px; height: 240px; margin: 0 auto; }
  }

  /* ── Down Payments (compact) ── */
  .down-payments {
    margin-bottom: 48px;
  }
  .down-payments-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .down-field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
  }
  .down-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .down-name.lauren { color: var(--lauren); }
  .down-name.polina { color: var(--polina); }
  .down-name.stewart { color: var(--stewart); }
  .down-field input {
    width: 120px;
    text-align: center;
    padding: 4px 8px;
    border: 1px solid rgba(201,168,76,.18);
    border-radius: 4px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(255,255,255,.03);
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .down-field input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,.06);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .manuscript { padding: 40px 20px 60px; }
    body::before { inset: 8px; }
    body::after { inset: 10px; }
    .title-block h1 { font-size: 28px; letter-spacing: 1px; }
    .ledger-row { flex-direction: column; gap: 6px; }
    .ledger-input-wrap { justify-content: flex-start; padding-left: 0; }
    .ledger-input-wrap input { width: 100%; text-align: left; }
    .chapter-heading::before,
    .chapter-heading::after { width: 40px; }
    .chapter-heading::before { right: calc(50% + 48px); }
    .chapter-heading::after { left: calc(50% + 48px); }
  }
</style>
</head>
<body>

<div class="manuscript">

  <!-- Title -->
  <div class="title-block">
    <h1>Mortgage Calculator</h1>
    <div class="title-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
    <p class="subtitle">A reckoning of debts, divided among co-owners</p>
  </div>

  <!-- Prologue -->
  <div class="chapter">
    <div class="epilogue" id="summaryRow"></div>
  </div>

  <!-- Down Payments -->
  <div class="down-payments">
    <div class="down-payments-row">
      <div class="down-field">
        <span class="down-name lauren">Lauren</span>
        <input type="text" id="down0" value="$200,000">
      </div>
      <div class="down-field">
        <span class="down-name polina">Polina</span>
        <input type="text" id="down1" value="$0">
      </div>
      <div class="down-field">
        <span class="down-name stewart">Stewart</span>
        <input type="text" id="down2" value="$575,000">
      </div>
    </div>
  </div>

  <!-- Chapter I & II: The Ownership · The Property -->
  <div class="dual-chapter">
      <!-- Left: Pie Chart -->
      <div class="chart-chapter">
        <div class="pie-wrap">
          <svg viewBox="0 0 200 200" id="pie"></svg>
        </div>
        <p class="chart-hint">Drag any slice half to adjust its boundary</p>
      </div>
      <!-- Right: Property Ledger -->
      <div class="property-ledger">
        <div class="ledger-row">
          <span class="ledger-label">Home Price</span>
          <div class="ledger-input-wrap">
            <input type="text" id="homePrice" value="$1,150,000">
          </div>
        </div>
        <div class="ledger-row">
          <span class="ledger-label">Interest Rate</span>
          <div class="ledger-input-wrap">
            <input type="text" id="interestRate" value="6.5%">
          </div>
        </div>
        <div class="ledger-row">
          <span class="ledger-label">Annual Insurance</span>
          <div class="ledger-input-wrap">
            <input type="text" id="insurance" value="$6,000">
          </div>
        </div>
        <div class="ledger-row">
          <span class="ledger-label">Annual Tax Rate</span>
          <div class="ledger-input-wrap">
            <input type="text" id="taxRate" value="1.01%">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chapter IV: The Reckoning -->
  <div class="reckoning-wrap">
    <table class="reckoning-table">
      <thead>
        <tr>
          <th>Owner</th>
          <th>Breakdown</th>
          <th>Monthly</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

</div>

<script>
(function () {
  const names = ['Lauren', 'Polina', 'Stewart'];
  const colors = ['#7c3aed', '#0891b2', '#d97706'];
  const initials = ['L', 'P', 'S'];

  // ── Pie Chart ──
  const svg = document.getElementById('pie');
  const legendEl = document.getElementById('pieLegend');
  const SVGNS = 'http://www.w3.org/2000/svg';
  const CX = 100, CY = 100, R = 86;
  const TAU = 2 * Math.PI;
  const MIN_GAP = 0.05;
  const SEAM_OVERLAP = 0.012;

  let boundaries = [0, 30, 50];

  function angleToPoint(a, radius = R) {
    return { x: CX + radius * Math.sin(a), y: CY - radius * Math.cos(a) };
  }
  function pointToAngle(x, y) {
    let a = Math.atan2(x - CX, CY - y);
    if (a < 0) a += TAU;
    return a;
  }
  function slicePath(startAngle, endAngle) {
    let sweep = endAngle - startAngle;
    if (sweep <= 0) sweep += TAU;
    const p1 = angleToPoint(startAngle);
    const p2 = angleToPoint(startAngle + sweep);
    const largeArc = sweep > Math.PI ? 1 : 0;
    return `M ${CX} ${CY} L ${p1.x.toFixed(3)} ${p1.y.toFixed(3)} ` +
           `A ${R} ${R} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)} Z`;
  }
  function eventToViewBox(evt) {
    const pt = svg.createSVGPoint();
    const src = evt.touches ? evt.touches[0] : evt;
    pt.x = src.clientX; pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function getPercent(i) {
    let span = boundaries[(i + 1) % 3] - boundaries[i];
    if (span < 0) span += 100;
    return span;
  }
  function pctToAngle(pct) {
    return pct / 100 * TAU;
  }
  function renderPie() {
    const n = 3;
    svg.innerHTML = '';

    for (let i = 0; i < n; i++) {
      const drawStart = pctToAngle(boundaries[i]) - SEAM_OVERLAP;
      const end = pctToAngle(boundaries[(i + 1) % n]);
      const path = document.createElementNS(SVGNS, 'path');
      path.setAttribute('d', slicePath(drawStart, end));
      path.setAttribute('fill', colors[i]);
      path.setAttribute('class', 'slice');
      svg.appendChild(path);
    }

    for (let i = 0; i < n; i++) {
      const start = pctToAngle(boundaries[i]);
      const end = pctToAngle(boundaries[(i + 1) % n]);
      let span = end - start;
      if (span <= 0) span += TAU;
      const bisect = start + span / 2;

      const leftHit = document.createElementNS(SVGNS, 'path');
      leftHit.setAttribute('d', slicePath(start, bisect));
      leftHit.setAttribute('fill', 'transparent');
      leftHit.setAttribute('class', 'slice-hit');
      leftHit.dataset.idx = i;
      svg.appendChild(leftHit);

      const rightHit = document.createElementNS(SVGNS, 'path');
      rightHit.setAttribute('d', slicePath(bisect, end));
      rightHit.setAttribute('fill', 'transparent');
      rightHit.setAttribute('class', 'slice-hit');
      rightHit.dataset.idx = (i + 1) % n;
      svg.appendChild(rightHit);
    }

    for (let i = 0; i < n; i++) {
      let span = boundaries[(i + 1) % n] - boundaries[i];
      if (span < 0) span += 100;
      let mid = boundaries[i] + span / 2;
      const lp = angleToPoint(pctToAngle(mid), R * 0.5);
      const pct = Math.round(getPercent(i));

      let displayName = names[i];
      if (displayName.length > 10) {
        displayName = displayName.slice(0, 9) + '\u2026';
      }

      const text = document.createElementNS(SVGNS, 'text');
      text.setAttribute('x', lp.x.toFixed(2));
      text.setAttribute('y', (lp.y - 5).toFixed(2));
      text.setAttribute('class', 'slice-label');
      text.setAttribute('font-size', '9');
      text.textContent = displayName;
      svg.appendChild(text);

      const text2 = document.createElementNS(SVGNS, 'text');
      text2.setAttribute('x', lp.x.toFixed(2));
      text2.setAttribute('y', (lp.y + 7).toFixed(2));
      text2.setAttribute('class', 'slice-label');
      text2.setAttribute('font-size', '9');
      text2.textContent = pct + '%';
      svg.appendChild(text2);
    }

  }

  let dragInfo = null;
  function setActive(i, on) {
    const hit = svg.querySelector(`.slice-hit[data-idx="${i}"]`);
    if (hit) hit.classList.toggle('dragging', on);
  }
  function onPointerDown(evt) {
    const t = evt.target;
    if (!t.classList.contains('slice-hit')) return;
    evt.preventDefault();
    dragInfo = { idx: parseInt(t.dataset.idx, 10) };
    setActive(dragInfo.idx, true);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchend', onPointerUp);
  }
  function onPointerMove(evt) {
    if (!dragInfo) return;
    evt.preventDefault();
    const i = dragInfo.idx;
    const prev = (i - 1 + 3) % 3, next = (i + 1) % 3;
    const lower = boundaries[prev], upper = boundaries[next];
    const p = eventToViewBox(evt);
    let mousePct = pointToAngle(p.x, p.y) / TAU * 100;
    let gap = upper - lower; if (gap < 0) gap += 100;
    let rel = mousePct - lower; if (rel < 0) rel += 100;
    rel = Math.max(MIN_GAP, Math.min(gap - MIN_GAP, rel));
    boundaries[i] = (lower + rel) % 100;
    renderPie();
    setActive(i, true);
    calculate();
  }
  function onPointerUp() {
    if (dragInfo) setActive(dragInfo.idx, false);
    dragInfo = null;
    window.removeEventListener('mousemove', onPointerMove);
    window.removeEventListener('touchmove', onPointerMove);
    window.removeEventListener('mouseup', onPointerUp);
    window.removeEventListener('touchend', onPointerUp);
    renderPie();
  }
  svg.addEventListener('mousedown', onPointerDown);
  svg.addEventListener('touchstart', onPointerDown, { passive: false });

  // ── Dollar formatting ──
  function parseDollar(str) {
    const cleaned = str.replace(/[^0-9.]/g, '');
    return parseFloat(cleaned) || 0;
  }
  function formatDollar(n) {
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function setupFormattedInput(el, formatFn, parseFn) {
    el.addEventListener('beforeinput', (e) => {
      if (e.inputType !== 'insertText' && e.inputType !== 'insertCompositionText') return;
      const char = e.data;
      if (!char || !/[0-9.]/.test(char)) return;
      if (char === '.' && el.value.replace(/[^0-9.]/g, '').includes('.')) {
        e.preventDefault();
        return;
      }
      e.preventDefault();
      const start = el.selectionStart;
      const end = el.selectionEnd;
      const before = el.value.slice(0, start);
      const after = el.value.slice(end);
      const cleanedBefore = before.replace(/[^0-9.]/g, '');
      const cleanedAfter = after.replace(/[^0-9.]/g, '');
      const newCleaned = cleanedBefore + char + cleanedAfter;
      let newValue;
      if (newCleaned.endsWith('.')) {
        const numPart = newCleaned.slice(0, -1);
        const formatted = formatFn(parseFloat(numPart) || 0);
        const suffix = formatted.replace(/[0-9.]/g, '');
        if (formatted.endsWith(suffix)) {
          newValue = numPart + '.' + suffix;
        } else {
          newValue = suffix + numPart + '.';
        }
      } else {
        const val = parseFn(newCleaned);
        newValue = formatFn(val);
      }
      el.value = newValue;
      const targetNumCount = cleanedBefore.length + 1;
      let pos = 0, count = 0;
      while (pos < newValue.length && count < targetNumCount) {
        if (/[0-9.]/.test(newValue[pos])) count++;
        pos++;
      }
      el.setSelectionRange(pos, pos);
    });
    el.addEventListener('blur', () => {
      const val = parseFn(el.value);
      el.value = formatFn(val);
    });
  }

  function setupDollarInput(el) {
    setupFormattedInput(el, formatDollar, parseDollar);
  }
  function parsePercent(str) {
    const cleaned = str.replace(/[^0-9.]/g, '');
    return parseFloat(cleaned) || 0;
  }
  function formatPercent(n) {
    return n + '%';
  }
  function setupPercentInput(el) {
    setupFormattedInput(el, formatPercent, parsePercent);
  }

  // ── Mortgage calculation ──
  function calcMonthlyMortgage(principal, annualRate, years = 30) {
    if (principal <= 0) return 0;
    const r = annualRate / 100 / 12;
    if (r === 0) return principal / (years * 12);
    return principal * (r * Math.pow(1 + r, years * 12)) / (Math.pow(1 + r, years * 12) - 1);
  }

  function calculate() {
    const homePrice = parseDollar(document.getElementById('homePrice').value);
    const rate = parseDollar(document.getElementById('interestRate').value);
    const insuranceYearly = parseDollar(document.getElementById('insurance').value);
    const taxRate = parseDollar(document.getElementById('taxRate').value);

    const downPmts = [
      parseDollar(document.getElementById('down0').value),
      parseDollar(document.getElementById('down1').value),
      parseDollar(document.getElementById('down2').value),
    ];

    const ownership = [0, 1, 2].map(i => getPercent(i) / 100);

    const insuranceMonthly = insuranceYearly / 12;
    const taxMonthly = (homePrice * taxRate / 100) / 12;

    let totalMonthly = 0;
    let tbody = '';
    for (let i = 0; i < 3; i++) {
      const shareOfHome = homePrice * ownership[i];
      const individualLoan = Math.max(0, shareOfHome - downPmts[i]);
      const mortgagePayment = calcMonthlyMortgage(individualLoan, rate);
      const insShare = insuranceMonthly * ownership[i];
      const taxShare = taxMonthly * ownership[i];
      const total = mortgagePayment + insShare + taxShare;
      totalMonthly += total;

      tbody += `<tr>
        <td>
          <div class="reckoning-name">
            <span class="reckoning-dot ${names[i].toLowerCase()}"></span>
            ${names[i]}
          </div>
        </td>
        <td>
          <div class="reckoning-breakdown">
            <div class="row"><span>P&amp;I</span><span>${formatDollar(mortgagePayment)}</span></div>
            <div class="row"><span>Insurance</span><span>${formatDollar(insShare)}</span></div>
            <div class="row"><span>Taxes</span><span>${formatDollar(taxShare)}</span></div>
          </div>
        </td>
        <td>${formatDollar(total)}</td>
      </tr>`;
    }

    document.getElementById('resultsBody').innerHTML = tbody;
    document.getElementById('rTotalAll').textContent = formatDollar(totalMonthly);

    const sumDown = downPmts.reduce((a, b) => a + b, 0);
    const totalLoan = Math.max(0, homePrice - sumDown);
    const totalMonthlyMortgage = calcMonthlyMortgage(totalLoan, rate);
    const summaryHtml = `
      <div class="epilogue-item"><div class="val">${formatDollar(homePrice)}</div><div class="lbl">Home Price</div></div>
      <div class="epilogue-item"><div class="val">${formatDollar(sumDown)}</div><div class="lbl">Total Down Payment</div></div>
      <div class="epilogue-item"><div class="val">${formatDollar(totalLoan)}</div><div class="lbl">Total Loan</div></div>
      <div class="epilogue-item"><div class="val">${formatDollar(totalMonthlyMortgage)}</div><div class="lbl">Total P&amp;I</div></div>
      <div class="epilogue-item"><div class="val">${formatDollar(insuranceMonthly)}</div><div class="lbl">Insurance / mo</div></div>
      <div class="epilogue-item"><div class="val">${formatDollar(taxMonthly)}</div><div class="lbl">Taxes / mo</div></div>
    `;
    document.getElementById('summaryRow').innerHTML = summaryHtml;
  }

  // ── Wire up inputs ──
  ['homePrice', 'insurance'].forEach(id => {
    const el = document.getElementById(id);
    setupDollarInput(el);
    el.addEventListener('input', calculate);
  });
  ['interestRate', 'taxRate'].forEach(id => {
    const el = document.getElementById(id);
    setupPercentInput(el);
    el.addEventListener('input', calculate);
  });
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`down${i}`);
    setupDollarInput(el);
    el.addEventListener('input', calculate);
  }

  document.querySelectorAll('input[type="text"]').forEach(el => {
    el.addEventListener('focus', () => el.select());
  });

  renderPie();
  calculate();
})();
</script>
</body>
</html>
