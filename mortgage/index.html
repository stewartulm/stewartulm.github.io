<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Calculator</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e4e0;
    --accent: #4f46e5;
    --lauren: #7c3aed;
    --polina: #0891b2;
    --stewart: #d97706;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  .container { max-width: 960px; margin: 0 auto; }

  h1 {
    font-size: 28px; font-weight: 700; text-align: center;
    margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center; color: var(--muted); font-size: 14px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 16px;
  }

  /* Shared Grid */
  .shared-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--muted); margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
    color: var(--text); background: #fafaf9;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    background: #fff;
  }
  .field .suffix {
    position: relative;
  }
  .field .suffix input { padding-right: 32px; }
  .field .suffix span {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 13px; pointer-events: none;
  }


  /* Pie Chart Section */
  .chart-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 640px) {
    .chart-section { grid-template-columns: 1fr; }
  }
  .pie-wrap {
    position: relative; width: 280px; height: 280px; margin: 0 auto;
    user-select: none; -webkit-user-select: none;
  }
  .pie-wrap svg { width: 100%; height: 100%; display: block; shape-rendering: geometricPrecision; }
  .slice { transition: opacity .15s; }
  .slice-hit {
    fill: transparent; cursor: grab; pointer-events: all;
  }
  .slice-hit.dragging { cursor: grabbing; }
  .slice-label {
    font-size: 9px; font-weight: 600; fill: #fff;
    text-anchor: middle; dominant-baseline: central;
    pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .hint {
    color: var(--muted); font-size: 12px; text-align: center;
    margin-top: 8px;
  }

  /* Participant Cards */
  .participants { display: flex; flex-direction: column; gap: 16px; }
  .p-card {
    border-radius: 10px; padding: 16px;
    border: 1.5px solid var(--border);
    background: #fafaf9;
  }
  .p-card.lauren { border-color: color-mix(in srgb, var(--lauren) 30%, white); }
  .p-card.polina { border-color: color-mix(in srgb, var(--polina) 30%, white); }
  .p-card.stewart { border-color: color-mix(in srgb, var(--stewart) 30%, white); }
  .p-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .p-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .p-name { font-weight: 600; font-size: 15px; }
  .p-ownership {
    font-size: 12px; color: var(--muted); margin-left: auto;
  }
  .p-card input {
    width: 100%; padding: 8px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit;
    color: var(--text); background: #fff; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .p-card input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.1);
  }

  /* Results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 640px) {
    .results-grid { grid-template-columns: 1fr; }
  }
  .result-card {
    border-radius: 10px; padding: 20px; text-align: center;
    border: 1.5px solid var(--border); background: #fafaf9;
  }
  .result-card.lauren { background: color-mix(in srgb, var(--lauren) 8%, white); }
  .result-card.polina { background: color-mix(in srgb, var(--polina) 8%, white); }
  .result-card.stewart { background: color-mix(in srgb, var(--stewart) 8%, white); }
  .result-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .result-total {
    font-size: 26px; font-weight: 700; margin: 8px 0;
    letter-spacing: -0.5px;
  }
  .result-card.lauren .result-total { color: var(--lauren); }
  .result-card.polina .result-total { color: var(--polina); }
  .result-card.stewart .result-total { color: var(--stewart); }
  .result-breakdown {
    font-size: 12px; color: var(--muted); line-height: 1.8;
    text-align: left; margin-top: 8px;
  }
  .result-breakdown .row {
    display: flex; justify-content: space-between;
  }

  /* Total bar */
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-radius: 10px;
    background: var(--text); color: #fff; margin-top: 16px;
  }
  .total-bar .label { font-size: 14px; font-weight: 500; }
  .total-bar .amount { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

  /* Pie chart legend */
  .pie-legend {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 4px;
  }
  .pie-legend-item {
    display: flex; align-items: center; gap: 8px; font-size: 14px;
  }
  .pie-swatch {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }
  .pie-legend-item .pct { font-weight: 600; margin-left: auto; }

  /* Summary row */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-top: 16px;
  }
  .summary-item {
    text-align: center; padding: 12px; border-radius: 8px;
    background: #fafaf9; border: 1px solid var(--border);
  }
  .summary-item .val { font-size: 18px; font-weight: 700; }
  .summary-item .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="container">
  <h1>Mortgage Calculator</h1>

  <!-- Shared Details -->
  <div class="card">
    <div class="card-title">Property Details</div>
    <div class="shared-grid">
      <div class="field">
        <label for="homePrice">Home Price</label>
        <input type="text" id="homePrice" value="$1,150,000">
      </div>
      <div class="field">
        <label for="interestRate">Interest Rate</label>
        <input type="text" id="interestRate" value="6.5%">
      </div>
      <div class="field">
        <label for="insurance">Annual Insurance</label>
        <input type="text" id="insurance" value="$6,000">
      </div>
      <div class="field">
        <label for="taxRate">Annual Tax Rate</label>
        <input type="text" id="taxRate" value="1.01%">
      </div>
    </div>
  </div>

  <!-- Pie Chart + Participants -->
  <div class="card">
    <div class="card-title">Ownership &amp; Down Payments</div>
    <div class="chart-section">
      <div>
        <div class="pie-wrap">
          <svg viewBox="0 0 200 200" id="pie"></svg>
        </div>
        <p class="hint">Drag any slice half to adjust its boundary</p>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
      <div class="participants">
        <div class="p-card lauren">
          <div class="p-header">
            <div class="p-avatar" style="background:var(--lauren)">L</div>
            <span class="p-name">Lauren</span>
            <span class="p-ownership" id="pOwn0">30%</span>
          </div>
          <label style="font-size:12px;color:var(--muted);margin-bottom:4px;display:block;">Down Payment</label>
          <input type="text" id="down0" value="$200,000">
        </div>
        <div class="p-card polina">
          <div class="p-header">
            <div class="p-avatar" style="background:var(--polina)">P</div>
            <span class="p-name">Polina</span>
            <span class="p-ownership" id="pOwn1">30%</span>
          </div>
          <label style="font-size:12px;color:var(--muted);margin-bottom:4px;display:block;">Down Payment</label>
          <input type="text" id="down1" value="$0">
        </div>
        <div class="p-card stewart">
          <div class="p-header">
            <div class="p-avatar" style="background:var(--stewart)">S</div>
            <span class="p-name">Stewart</span>
            <span class="p-ownership" id="pOwn2">40%</span>
          </div>
          <label style="font-size:12px;color:var(--muted);margin-bottom:4px;display:block;">Down Payment</label>
          <input type="text" id="down2" value="$575,000">
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="card">
    <div class="card-title">Monthly Payments</div>
    <div class="results-grid">
      <div class="result-card lauren">
        <div class="result-name">Lauren</div>
        <div class="result-total" id="rTotal0">$0</div>
        <div class="result-breakdown" id="rBreak0"></div>
      </div>
      <div class="result-card polina">
        <div class="result-name">Polina</div>
        <div class="result-total" id="rTotal1">$0</div>
        <div class="result-breakdown" id="rBreak1"></div>
      </div>
      <div class="result-card stewart">
        <div class="result-name">Stewart</div>
        <div class="result-total" id="rTotal2">$0</div>
        <div class="result-breakdown" id="rBreak2"></div>
      </div>
    </div>
    <div class="total-bar">
      <span class="label">Combined Monthly Payment</span>
      <span class="amount" id="rTotalAll">$0</span>
    </div>
    <div class="summary-row" id="summaryRow"></div>
  </div>
</div>

<script>
(function () {
  // ── State ──
  const names = ['Lauren', 'Polina', 'Stewart'];
  const colors = ['#7c3aed', '#0891b2', '#d97706'];
  const initials = ['L', 'P', 'S'];

  // ── Pie Chart ──
  const svg = document.getElementById('pie');
  const legendEl = document.getElementById('pieLegend');
  const SVGNS = 'http://www.w3.org/2000/svg';
  const CX = 100, CY = 100, R = 86;
  const TAU = 2 * Math.PI;
  const MIN_GAP = 0.05;
  const SEAM_OVERLAP = 0.012;

  let boundaries = [0, 30, 50]; // stored as percentages (0–100)

  function angleToPoint(a, radius = R) {
    return { x: CX + radius * Math.sin(a), y: CY - radius * Math.cos(a) };
  }
  function pointToAngle(x, y) {
    let a = Math.atan2(x - CX, CY - y);
    if (a < 0) a += TAU;
    return a;
  }
  function slicePath(startAngle, endAngle) {
    let sweep = endAngle - startAngle;
    if (sweep <= 0) sweep += TAU;
    const p1 = angleToPoint(startAngle);
    const p2 = angleToPoint(startAngle + sweep);
    const largeArc = sweep > Math.PI ? 1 : 0;
    return `M ${CX} ${CY} L ${p1.x.toFixed(3)} ${p1.y.toFixed(3)} ` +
           `A ${R} ${R} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)} Z`;
  }
  function eventToViewBox(evt) {
    const pt = svg.createSVGPoint();
    const src = evt.touches ? evt.touches[0] : evt;
    pt.x = src.clientX; pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function getPercent(i) {
    let span = boundaries[(i + 1) % 3] - boundaries[i];
    if (span < 0) span += 100;
    return span;
  }
  function pctToAngle(pct) {
    return pct / 100 * TAU;
  }
  function renderPie() {
    const n = 3;
    svg.innerHTML = '';

    // 1. Colored slices (bottom layer)
    for (let i = 0; i < n; i++) {
      const drawStart = pctToAngle(boundaries[i]) - SEAM_OVERLAP;
      const end = pctToAngle(boundaries[(i + 1) % n]);
      const path = document.createElementNS(SVGNS, 'path');
      path.setAttribute('d', slicePath(drawStart, end));
      path.setAttribute('fill', colors[i]);
      path.setAttribute('class', 'slice');
      svg.appendChild(path);
    }

    // 2. Hit areas (bisected halves)
    for (let i = 0; i < n; i++) {
      const start = pctToAngle(boundaries[i]);
      const end = pctToAngle(boundaries[(i + 1) % n]);
      let span = end - start;
      if (span <= 0) span += TAU;
      const bisect = start + span / 2;

      // Left half → adjusts start boundary (boundaries[i])
      const leftHit = document.createElementNS(SVGNS, 'path');
      leftHit.setAttribute('d', slicePath(start, bisect));
      leftHit.setAttribute('fill', 'transparent');
      leftHit.setAttribute('class', 'slice-hit');
      leftHit.dataset.idx = i;
      svg.appendChild(leftHit);

      // Right half → adjusts end boundary (boundaries[(i+1)%n])
      const rightHit = document.createElementNS(SVGNS, 'path');
      rightHit.setAttribute('d', slicePath(bisect, end));
      rightHit.setAttribute('fill', 'transparent');
      rightHit.setAttribute('class', 'slice-hit');
      rightHit.dataset.idx = (i + 1) % n;
      svg.appendChild(rightHit);


    }

    // 3. Labels (top layer)
    for (let i = 0; i < n; i++) {
      let span = boundaries[(i + 1) % n] - boundaries[i];
      if (span < 0) span += 100;
      let mid = boundaries[i] + span / 2;
      const lp = angleToPoint(pctToAngle(mid), R * 0.5);
      const pct = Math.round(getPercent(i));

      let displayName = names[i];
      if (displayName.length > 10) {
        displayName = displayName.slice(0, 9) + '\u2026';
      }

      const text = document.createElementNS(SVGNS, 'text');
      text.setAttribute('x', lp.x.toFixed(2));
      text.setAttribute('y', (lp.y - 5).toFixed(2));
      text.setAttribute('class', 'slice-label');
      text.setAttribute('font-size', '9');
      text.textContent = displayName;
      svg.appendChild(text);

      const text2 = document.createElementNS(SVGNS, 'text');
      text2.setAttribute('x', lp.x.toFixed(2));
      text2.setAttribute('y', (lp.y + 7).toFixed(2));
      text2.setAttribute('class', 'slice-label');
      text2.setAttribute('font-size', '9');
      text2.textContent = pct + '%';
      svg.appendChild(text2);
    }

    renderLegend();
  }

  function renderLegend() {
    legendEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const item = document.createElement('div');
      item.className = 'pie-legend-item';
      item.innerHTML = `<span class="pie-swatch" style="background:${colors[i]}"></span>${names[i]}<span class="pct">${Math.round(getPercent(i))}%</span>`;
      legendEl.appendChild(item);
    }
  }

  // Pie drag
  let dragInfo = null;
  function setActive(i, on) {
    const hit = svg.querySelector(`.slice-hit[data-idx="${i}"]`);
    if (hit) hit.classList.toggle('dragging', on);
  }
  function onPointerDown(evt) {
    const t = evt.target;
    if (!t.classList.contains('slice-hit')) return;
    evt.preventDefault();
    dragInfo = { idx: parseInt(t.dataset.idx, 10) };
    setActive(dragInfo.idx, true);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchend', onPointerUp);
  }
  function onPointerMove(evt) {
    if (!dragInfo) return;
    evt.preventDefault();
    const i = dragInfo.idx;
    const prev = (i - 1 + 3) % 3, next = (i + 1) % 3;
    const lower = boundaries[prev], upper = boundaries[next];
    const p = eventToViewBox(evt);
    // Convert mouse angle to percentage
    let mousePct = pointToAngle(p.x, p.y) / TAU * 100;
    let gap = upper - lower; if (gap < 0) gap += 100;
    let rel = mousePct - lower; if (rel < 0) rel += 100;
    rel = Math.max(MIN_GAP, Math.min(gap - MIN_GAP, rel));
    boundaries[i] = (lower + rel) % 100;
    renderPie();
    setActive(i, true);
    updateOwnershipDisplays();
    calculate();
  }
  function onPointerUp() {
    if (dragInfo) setActive(dragInfo.idx, false);
    dragInfo = null;
    window.removeEventListener('mousemove', onPointerMove);
    window.removeEventListener('touchmove', onPointerMove);
    window.removeEventListener('mouseup', onPointerUp);
    window.removeEventListener('touchend', onPointerUp);
    renderPie();
  }
  svg.addEventListener('mousedown', onPointerDown);
  svg.addEventListener('touchstart', onPointerDown, { passive: false });

  function updateOwnershipDisplays() {
    for (let i = 0; i < 3; i++) {
      document.getElementById(`pOwn${i}`).textContent = Math.round(getPercent(i)) + '%';
    }
  }

  // ── Dollar formatting ──
  function parseDollar(str) {
    const cleaned = str.replace(/[^0-9.]/g, '');
    return parseFloat(cleaned) || 0;
  }
  function formatDollar(n) {
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function setupFormattedInput(el, formatFn, parseFn) {
    el.addEventListener('beforeinput', (e) => {
      if (e.inputType !== 'insertText' && e.inputType !== 'insertCompositionText') return;
      const char = e.data;
      if (!char || !/[0-9.]/.test(char)) return;

      // Prevent multiple decimal points
      if (char === '.' && el.value.replace(/[^0-9.]/g, '').includes('.')) {
        e.preventDefault();
        return;
      }

      e.preventDefault();

      const start = el.selectionStart;
      const end = el.selectionEnd;
      const before = el.value.slice(0, start);
      const after = el.value.slice(end);
      const cleanedBefore = before.replace(/[^0-9.]/g, '');
      const cleanedAfter = after.replace(/[^0-9.]/g, '');
      const newCleaned = cleanedBefore + char + cleanedAfter;

      let newValue;
      if (newCleaned.endsWith('.')) {
        // User is typing a decimal — preserve the dot before the suffix
        const numPart = newCleaned.slice(0, -1);
        const formatted = formatFn(parseFloat(numPart) || 0);
        const suffix = formatted.replace(/[0-9.]/g, '');
        if (formatted.endsWith(suffix)) {
          // Percent-like: "0%" → "0.%"
          newValue = numPart + '.' + suffix;
        } else {
          // Dollar-like: "$0" → "$6."
          newValue = suffix + numPart + '.';
        }
      } else {
        const val = parseFn(newCleaned);
        newValue = formatFn(val);
      }
      el.value = newValue;

      // Cursor: count how many numeric chars are before the cursor position in the new value
      const targetNumCount = cleanedBefore.length + 1;
      let pos = 0, count = 0;
      while (pos < newValue.length && count < targetNumCount) {
        if (/[0-9.]/.test(newValue[pos])) count++;
        pos++;
      }
      el.setSelectionRange(pos, pos);
    });

    el.addEventListener('blur', () => {
      const val = parseFn(el.value);
      el.value = formatFn(val);
    });
  }

  function setupDollarInput(el) {
    setupFormattedInput(el, formatDollar, parseDollar);
  }

  function setupPercentInput(el) {
    setupFormattedInput(el, formatPercent, parsePercent);
  }

  function parsePercent(str) {
    const cleaned = str.replace(/[^0-9.]/g, '');
    return parseFloat(cleaned) || 0;
  }
  function formatPercent(n) {
    return n + '%';
  }
  function setupPercentInput(el) {
    setupFormattedInput(el, formatPercent, parsePercent);
  }

  // ── Mortgage calculation ──
  function calcMonthlyMortgage(principal, annualRate, years = 30) {
    if (principal <= 0) return 0;
    const r = annualRate / 100 / 12;
    if (r === 0) return principal / (years * 12);
    return principal * (r * Math.pow(1 + r, years * 12)) / (Math.pow(1 + r, years * 12) - 1);
  }

  function calculate() {
    const homePrice = parseDollar(document.getElementById('homePrice').value);
    const rate = parseDollar(document.getElementById('interestRate').value);
    const insuranceYearly = parseDollar(document.getElementById('insurance').value);
    const taxRate = parseDollar(document.getElementById('taxRate').value);

    const downPmts = [
      parseDollar(document.getElementById('down0').value),
      parseDollar(document.getElementById('down1').value),
      parseDollar(document.getElementById('down2').value),
    ];

    const ownership = [0, 1, 2].map(i => getPercent(i) / 100);

    // Totals
    const insuranceMonthly = insuranceYearly / 12;
    const taxMonthly = (homePrice * taxRate / 100) / 12;

    // Individual calculations
    let totalMonthly = 0;
    for (let i = 0; i < 3; i++) {
      const shareOfHome = homePrice * ownership[i];
      const individualLoan = Math.max(0, shareOfHome - downPmts[i]);
      const mortgagePayment = calcMonthlyMortgage(individualLoan, rate);
      const insShare = insuranceMonthly * ownership[i];
      const taxShare = taxMonthly * ownership[i];
      const total = mortgagePayment + insShare + taxShare;

      totalMonthly += total;

      document.getElementById(`rTotal${i}`).textContent = formatDollar(total);
      document.getElementById(`rBreak${i}`).innerHTML = `
        <div class="row"><span>P&I</span><span>${formatDollar(mortgagePayment)}</span></div>
        <div class="row"><span>Insurance</span><span>${formatDollar(insShare)}</span></div>
        <div class="row"><span>Taxes</span><span>${formatDollar(taxShare)}</span></div>
      `;
    }

    document.getElementById('rTotalAll').textContent = formatDollar(totalMonthly);

    // Summary
    const sumDown = downPmts.reduce((a, b) => a + b, 0);
    const totalLoan = Math.max(0, homePrice - sumDown);
    const totalMonthlyMortgage = calcMonthlyMortgage(totalLoan, rate);
    const summaryHtml = `
      <div class="summary-item"><div class="val">${formatDollar(homePrice)}</div><div class="lbl">Home Price</div></div>
      <div class="summary-item"><div class="val">${formatDollar(sumDown)}</div><div class="lbl">Total Down Payment</div></div>
      <div class="summary-item"><div class="val">${formatDollar(totalLoan)}</div><div class="lbl">Total Loan</div></div>
      <div class="summary-item"><div class="val">${formatDollar(totalMonthlyMortgage)}</div><div class="lbl">Total P&I</div></div>
      <div class="summary-item"><div class="val">${formatDollar(insuranceMonthly)}</div><div class="lbl">Insurance/mo</div></div>
      <div class="summary-item"><div class="val">${formatDollar(taxMonthly)}</div><div class="lbl">Taxes/mo</div></div>
    `;
    document.getElementById('summaryRow').innerHTML = summaryHtml;
  }

  // ── Wire up inputs ──
  // Dollar-value inputs: auto-format with commas & $ sign
  ['homePrice', 'insurance'].forEach(id => {
    const el = document.getElementById(id);
    setupDollarInput(el);
    el.addEventListener('input', calculate);
  });
  // Percentage inputs: auto-format with trailing %
  ['interestRate', 'taxRate'].forEach(id => {
    const el = document.getElementById(id);
    setupPercentInput(el);
    el.addEventListener('input', calculate);
  });
  // Down payment inputs
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`down${i}`);
    setupDollarInput(el);
    el.addEventListener('input', calculate);
  }

  // Select all text on focus for number/currency inputs
  document.querySelectorAll('input[type="text"]').forEach(el => {
    el.addEventListener('focus', () => el.select());
  });

  // ── Init ──
  renderPie();
  calculate();
})();
</script>
</body>
</html>
